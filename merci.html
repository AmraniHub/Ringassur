  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f5f9ff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem 1rem;
      color: #1e1e1e;
      -webkit-font-smoothing: antialiased;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 2.5rem 1.5rem;
      max-width: 500px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    @media (max-width: 480px) {
      .card { padding: 2rem 1.2rem; border-radius: 12px; }
      h1 { font-size: 1.3rem !important; }
      .btn { width: 100%; display: block; }
    }
    .check {
      width: 80px; height: 80px;
      background: #e6f4ea;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1.5rem;
    }
    .check svg { width: 44px; height: 44px; }
    h1 { font-size: 1.6rem; font-weight: 700; color: #002d52; margin-bottom: 0.75rem; }
    h1 span { color: #0071cc; }
    p { font-size: 0.95rem; color: #525252; line-height: 1.6; margin-bottom: 1.5rem; }
    .info-box {
      background: #ebf6ff;
      border-radius: 10px;
      padding: 1rem 1.25rem;
      text-align: left;
      font-size: 0.875rem;
      color: #1e1e1e;
      margin-bottom: 1.5rem;
    }
    .info-box .row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.35rem 0;
      border-bottom: 1px solid #d6edff;
    }
    .info-box .row:last-child { border-bottom: none; }
    .info-box .dot { color: #0071cc; font-size: 1.2rem; }
    .btn {
      display: inline-block;
      background: #f8aa36;
      color: #fff;
      font-weight: 700;
      font-size: 1rem;
      padding: 0.9rem 2rem;
      border-radius: 8px;
      text-decoration: none;
      transition: background 0.2s;
    }
    .btn:hover { background: #e69a20; }
    .logo {
      font-size: 1.4rem;
      font-weight: 700;
      color: #002d52;
      margin-bottom: 2rem;
      letter-spacing: -0.03em;
    }
    .logo span { color: #f8aa36; }
  </style>
</head>
<body>
  <div class="logo">Ring<span>assur</span></div>

      <svg viewBox="0 0 24 24" fill="none" stroke="#2e7d32" stroke-width="2.5">
        <path d="M22 11.08V12a10 10 0 11-5.93-9.14"/>
        <polyline points="22 4 12 14.01 9 11.01"/>
      </svg>
    </div>

    <h1>Votre demande a bien été <span>enregistrée !</span></h1>
    <p>Un conseiller Ringassur vous contactera dans les <strong>24 heures</strong> pour finaliser votre devis RC Décennale personnalisé.</p>

    <div class="info-box">
      <div class="row"><span class="dot">✓</span><span>Devis gratuit et sans engagement</span></div>
      <div class="row"><span class="dot">✓</span><span>Réponse sous 24h par téléphone ou e-mail</span></div>
      <div class="row"><span class="dot">✓</span><span>À partir de 47 € / mois</span></div>
    </div>

    <a href="/" class="btn">Faire un nouveau devis</a>
  </div>
</body>
</html>
